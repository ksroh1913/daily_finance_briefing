name: Daily Market Summary

on:
  schedule:
    # Runs at 10:00 AM Asia/Seoul (01:00 UTC) every day
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-market-summary
  cancel-in-progress: false

jobs:
  test-generate-and-save:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Generate market summary report
        env:
          TZ: Asia/Seoul
        run: python main.py

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          KST_DATE=$(TZ=Asia/Seoul date +'%Y-%m-%d')
          git commit -m "chore: daily market summary (${KST_DATE} KST)"
          git push
